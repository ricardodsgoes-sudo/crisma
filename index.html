<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="./brasao-logo.webp" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C41230" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Crisma 2026" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Aplica o tema salvo ANTES do React renderizar, evitando flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('crisma:theme') || 'light';
          var isDark =
            saved === 'dark' ||
            (saved === 'auto' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Crisma de Adultos 2026 — Paróquia Maria Mãe de Deus. Acompanhe os encontros semanais, faça quizzes e cresça na fé." />
    <title>Crisma de Adultos 2026 · Paróquia Maria Mãe de Deus</title>
    <!-- Preload do hero LCP para reduzir Largest Contentful Paint -->
    <link rel="preload" as="image" href="./crisma-capa.webp" imagesrcset="./crisma-capa.webp 1x, ./crisma-capa@2x.webp 2x" fetchpriority="high" />

    <!-- Google Fonts com preconnect + async (não bloqueia render) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Lora:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Lora:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
