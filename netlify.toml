[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — qualquer rota cai no index.html (HashRouter cuida do resto)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache agressivo nos assets versionados pelo Vite (hash no nome)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imagens estáticas — cache moderado
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"
